<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Equipos - Admin</title>
    <link rel="stylesheet" href="./teams.css">
</head>
<body>
    <header class="admin-header">
        <h1>Panel de Administración</h1>
        <nav>
            <button id="logoutBtn" class="btn-secondary">Cerrar Sesión</button>
        </nav>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Crear Nuevo Equipo</h2>
            <form id="teamForm">
                <div class="form-group">
                    <label for="teamName">Nombre del Equipo:</label>
                    <input type="text" id="teamName" name="name" required placeholder="Ej. Real Madrid">
                </div>
                <button type="submit" class="btn-primary">Guardar Equipo</button>
            </form>
            <div id="formMessage" class="message"></div>
        </section>

        <section class="list-section">
            <h2>Equipos Registrados</h2>
            <div class="table-responsive">
                <table id="teamsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre del Equipo</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="teamsTable
